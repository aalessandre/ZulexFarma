<div class="tela-erp">
  <aside class="tela-sidebar">
    <div class="sidebar-item tile-sair" (click)="sairDaTela()">
      <div class="sidebar-item-header">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Sair</span>
      </div>
      <span class="sidebar-sub">Fechar tela</span>
    </div>
  </aside>

  <main class="tela-conteudo">
    <div class="menu-header">
      <h2>Fidelidade</h2>
      <span class="menu-sub">Campanhas de pontos, cashback e catálogo de prêmios</span>
    </div>

    <div class="menu-grid">
      @for (tile of tiles; track tile.sigla) {
        <div class="menu-tile" (click)="navegar(tile)">
          <div class="menu-tile-icon" [innerHTML]="getIcon(tile.icon)"></div>
          <div class="menu-tile-info">
            <span class="menu-tile-sigla">{{ tile.sigla }}</span>
            <span class="menu-tile-label">{{ tile.label }}</span>
          </div>
        </div>
      }
    </div>
  </main>
</div>
