<!-- Botão flutuante -->
<button class="cassi-fab" (click)="toggle()" [class.aberto]="aberto()">
  @if (!aberto()) {
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
    </svg>
  } @else {
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>
  }
</button>

<!-- Painel de chat -->
@if (aberto()) {
  <div class="cassi-panel">
    <!-- Header -->
    <div class="cassi-header">
      <div class="cassi-avatar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M12 2a7 7 0 017 7v1a7 7 0 01-14 0V9a7 7 0 017-7z"/>
          <path d="M5 12v2a7 7 0 0014 0v-2"/>
          <circle cx="9" cy="9" r="1" fill="currentColor"/>
          <circle cx="15" cy="9" r="1" fill="currentColor"/>
          <path d="M9 13c.5 1 1.5 1.5 3 1.5s2.5-.5 3-1.5"/>
        </svg>
      </div>
      <div class="cassi-info">
        <span class="cassi-nome">Cassi</span>
        <span class="cassi-status">Assistente ZulexPharma</span>
      </div>
    </div>

    <!-- Mensagens -->
    <div class="cassi-body" #chatBody>
      @for (msg of mensagens(); track $index) {
        <div class="cassi-msg" [class.user]="msg.role === 'user'" [class.assistant]="msg.role === 'assistant'">
          @if (msg.role === 'assistant') {
            <div class="msg-avatar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a7 7 0 017 7v1a7 7 0 01-14 0V9a7 7 0 017-7z"/></svg>
            </div>
          }
          <div class="msg-content">
            <div class="msg-text" [innerHTML]="formatarMensagem(msg.content)"></div>
            @if (msg.acao) {
              <button class="msg-acao" (click)="executarAcao(msg.acao!)">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                Abrir tela
              </button>
            }
          </div>
        </div>
      }

      @if (enviando()) {
        <div class="cassi-msg assistant">
          <div class="msg-avatar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a7 7 0 017 7v1a7 7 0 01-14 0V9a7 7 0 017-7z"/></svg>
          </div>
          <div class="msg-content">
            <div class="msg-typing">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>
      }
    </div>

    <!-- Input -->
    <div class="cassi-footer">
      <input
        #inputRef
        type="text"
        [(ngModel)]="inputTexto"
        (keydown)="onKeyDown($event)"
        placeholder="Pergunte algo..."
        [disabled]="enviando()"
        autocomplete="off"
      />
      <button class="cassi-send" (click)="enviar()" [disabled]="!inputTexto.trim() || enviando()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
}
