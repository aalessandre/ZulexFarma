<div class="relative overflow-hidden h-screen bg-white">
  <div class="grid grid-cols-12 gap-3 h-screen">
    <div class="xl:col-span-8 lg:col-span-7 col-span-12 bg-light-primary relative">
      <div class="p-6 h-full">
        <app-auth-branding></app-auth-branding>

        <div class="items-center justify-center h-full hidden lg:flex">
          <img src="/assets/images/backgrounds/login-bg.png" alt="login" style="max-width: 500px" />
        </div>
      </div>
    </div>
    <div class="xl:col-span-4 lg:col-span-5 col-span-12 sm:px-12 p-5">
      <div class="flex lg:h-screen items-center lg:px-3 lg:justify-start justify-center">
        <div class="max-w-[420px] w-full mx-auto">
          <h4 class="font-bold text-2xl m-0">Welcome to Materialpro</h4>
          <span class="block text-sm mt-2">Your Admin Dashboard</span>

          <div class="grid grid-cols-12 gap-6 mt-6">
            <div class="col-span-6">
              <button mat-stroked-button class="w-full">
                <div class="flex items-center gap-2">
                  <i class="iconify text-xl" data-icon="devicon:google"></i>
                  Google
                </div>
              </button>
            </div>
            <div class="col-span-6">
              <button mat-stroked-button class="w-full flex items-center">
                <div class="flex items-center gap-2">
                  <i class="iconify text-xl" data-icon="logos:facebook"></i>
                  Facebook
                </div>
              </button>
            </div>
          </div>

          <div
            class="or-border relative text-center before:content-[''] before:absolute before:left-0 before:top-1/2 
            before:w-[120px] before:h-px before:bg-(--mat-sys-outline) after:content-[''] after:absolute after:right-0 after:top-1/2 after:w-[120px] after:h-px after:bg-(--mat-sys-outline) mt-8">
            or sign in with</div>

          <div
            class="bg-light-primary text-primary font-medium rounded-lg p-4 mt-4 text-center flex justify-center items-center gap-2">
            <span>Username : admin </span>||<span>Password : admin123</span>
          </div>

          <form class="mt-8">
            <mat-label class="text-sm font-semibold mb-3 block">Username</mat-label>
            <mat-form-field appearance="outline" class="w-100" color="primary">
              <input matInput required="" #u1 />
            </mat-form-field>

            <mat-label class="text-sm font-semibold mb-3 block">Password</mat-label>
            <mat-form-field appearance="outline" class="w-100" color="primary">
              <input matInput type="password" required="" #p2 />
            </mat-form-field>

            <div class="flex items-center mb-3">
              <mat-checkbox color="primary">Remember this Device</mat-checkbox>
              <a [routerLink]="['/starter']" class="text-primary font-semibold no-underline ms-auto text-sm">Forgot
                Password
                ?</a>
            </div>
            <button mat-flat-button color="primary" class="w-100" (click)="check(u1.value, p2.value)">
              Sign In
            </button>
          </form>

          <span class="font-medium block mt-6">New to MaterialM?
            <a [routerLink]="['/authentication/register']" class="no-underline text-primary font-medium text-sm">
              Create an account</a>
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
